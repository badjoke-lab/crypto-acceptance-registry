name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node scripts/export/validate-inbox.ts
      - run: node scripts/product/validate-product-dataset.ts
      - run: node scripts/product/validate-product-stats.ts
